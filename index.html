<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQkImtZjO9RXKb6t--VplvUQl7KAjdN4nMXmJkwjfUv0H8ZrfmBMD704_JGjbKsCa1joz7tqWbnyetx/pub?gid=1388046897&single=true&output=csv";

function cargarDatos(){

    fetch(url + "&t=" + Date.now())
    .then(response => response.text())
    .then(csv => {

        const rows = csv.trim().split("\n");
        let html = "";

        for(let i = 1; i < rows.length; i++){

            let cols = rows[i].split(",");

            if(cols.length < 5) continue;

            html += `
            <tr>
                <td>${cols[0]}</td>
                <td>${cols[1]}</td>
                <td>${cols[2]}</td>
                <td>${cols[3]}</td>
                <td>${cols[4]}</td>
            </tr>
            `;
        }

        document.getElementById("data").innerHTML = html;
    })
    .catch(error => {
        console.error("Error cargando CSV:", error);
    });
}

// Primera carga
cargarDatos();

// Actualizar cada 30 segundos
setInterval(cargarDatos, 30000);

</script>
