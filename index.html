<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Comisiones - Ranking UP MOVIL</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    margin:0;
}

h1{
    background:#0033A0;
    color:white;
    text-align:center;
    padding:15px;
    margin:0;
}

table{
    width:95%;
    margin:20px auto;
    border-collapse: collapse;
    background:white;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

th{
    background:#FFDD00;
    padding:10px;
}

td{
    padding:8px;
    border-bottom:1px solid #ddd;
    text-align:center;
}

tr:hover{
    background:#f1f1f1;
}
</style>
</head>

<body>

<h1>📊 RANKING UP MOVIL - TIEMPO REAL</h1>

<table>
    <thead>
        <tr>
            <th>ASESOR</th>
            <th>UP MOVIL</th>
            <th>MIGRACIONES</th>
            <th>UP HOGAR</th>
        </tr>
    </thead>

    <tbody id="data"></tbody>
</table>

<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQkImtZjO9RXKb6t--VplvUQl7KAjdN4nMXmJkwjfUv0H8ZrfmBMD704_JGjbKsCa1joz7tqWbnyetx/pub?gid=1388046897&single=true&output=csv";

const ordenSupervisores = [
    "PETER TASAYCO",
    "ISABEL PEREYRA",
    "JOSE ALVAREZ",
    "PEDRO LLAZA"
];

function cargarDatos(){

fetch(url + "&t=" + Date.now())
.then(r => r.text())
.then(csv => {

    const rows = csv.trim().split("\n");

    let data = [];

    // convertir CSV a objetos
    for(let i = 1; i < rows.length; i++){

        let c = rows[i].split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/);

        if(!c[0] || !c[1]) continue;

        data.push({
            supervisor: c[0],
            asesor: c[1],
            upMovil: c[2] || 0,
            migraciones: c[3] || 0,
            upHogar: c[4] || 0
        });
    }

    // agrupar
    let grupos = {};

    data.forEach(item => {

        if(!grupos[item.supervisor]){
            grupos[item.supervisor] = [];
        }

        grupos[item.supervisor].push(item);
    });

    let html = "";

    // ordenar supervisores
    ordenSupervisores.forEach(sup => {

        if(!grupos[sup]) return;

        let totalMovil = 0;
        let totalMigraciones = 0;
        let totalHogar = 0;

        html += `
        <tr>
            <td colspan="4" style="background:#0033A0;color:white;font-weight:bold;text-align:left;padding:10px;">
                ${sup}
            </td>
        </tr>
        `;

        grupos[sup].forEach(a => {

            let movil = Number(a.upMovil) || 0;
            let migra = Number(a.migraciones) || 0;
            let hogar = Number(a.upHogar) || 0;

            totalMovil += movil;
            totalMigraciones += migra;
            totalHogar += hogar;

            html += `
            <tr>
                <td style="text-align:left;">${a.asesor}</td>
                <td>${movil}</td>
                <td>${migra}</td>
                <td>${hogar}</td>
            </tr>
            `;
        });

        // TOTAL EN ROJO
        html += `
        <tr>
            <td colspan="4" style="
                background:#d60000;
                color:white;
                font-weight:bold;
                text-align:left;
                padding:10px;
            ">
                TOTAL ${sup} |
                UP MOVIL: ${totalMovil} |
                MIGRACIONES: ${totalMigraciones} |
                UP HOGAR: ${totalHogar}
            </td>
        </tr>
        `;
    });

    document.getElementById("data").innerHTML = html;

})
.catch(err => console.error("Error cargando CSV:", err));

}

// carga inicial
cargarDatos();

// refresh automático
setInterval(cargarDatos, 10000);

</script>

</body>
</html>
