<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Comisiones - Ranking UP MOVIL</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    margin:0;
}

h1{
    background:#0033A0;
    color:white;
    text-align:center;
    padding:15px;
    margin:0;
}

table{
    width:95%;
    margin:20px auto;
    border-collapse: collapse;
    background:white;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

th{
    background:#FFDD00;
    padding:10px;
}

td{
    padding:8px;
    border-bottom:1px solid #ddd;
    text-align:center;
}

tr:hover{
    background:#f1f1f1;
}
</style>
</head>

<body>

<h1>📊 RANKING UP MOVIL - TIEMPO REAL</h1>

<table>
    <thead>
        <tr>
            <th>DNI</th>
            <th>ASESOR</th>
            <th>UP MOVIL</th>
            <th>MIGRACIONES</th>
            <th>UP HOGAR</th>
        </tr>
    </thead>

    <tbody id="data"></tbody>
</table>

<script>

const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQkImtZjO9RXKb6t--VplvUQl7KAjdN4nMXmJkwjfUv0H8ZrfmBMD704_JGjbKsCa1joz7tqWbnyetx/pub?gid=1388046897&single=true&output=csv";

function cargarDatos(){

fetch(url + "&t=" + Date.now())
.then(r => r.text())
.then(csv => {

    const rows = csv.trim().split("\n");

    let data = [];

    // 1. convertir CSV en objetos
    for(let i = 1; i < rows.length; i++){

        let c = rows[i].split(",");

        if(c.length < 5) continue;

        data.push({
            supervisor: c[0],
            asesor: c[1]
        });
    }

    // 2. agrupar por supervisor
    let grupos = {};

    data.forEach(item => {

        if(!grupos[item.supervisor]){
            grupos[item.supervisor] = [];
        }

        grupos[item.supervisor].push(item.asesor);
    });

    // 3. construir HTML estilo lista
    let html = "";

    for(let sup in grupos){

        html += `
        <tr>
            <td colspan="5" style="
                background:#0033A0;
                color:white;
                font-weight:bold;
                text-align:left;
                padding:10px;
                font-size:16px;
            ">
                ${sup}
            </td>
        </tr>
        `;

        html += `
        <tr>
            <td colspan="5" style="padding:5px;"></td>
        </tr>
        `;

        grupos[sup].forEach(a => {

            html += `
            <tr>
                <td colspan="5" style="
                    text-align:left;
                    padding-left:25px;
                ">
                    - ${a}
                </td>
            </tr>
            `;
        });
    }

    document.getElementById("data").innerHTML = html;

})
.catch(err => console.error(err));

}

cargarDatos();
setInterval(cargarDatos, 30000);

</script>

</body>
</html>
